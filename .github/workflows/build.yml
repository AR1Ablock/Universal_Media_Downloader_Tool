name: Build MediaDownloader

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Choose environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production

permissions:
  contents: write # REQUIRED for creating releases

jobs:
  build:
    strategy:
      matrix:
        # ===================================================================
        # FUTURE-PROOF MATRIX — just add a new row to support any new OS/arch
        # ===================================================================
        include:
          - os: windows-latest
            arch: x64
            runtime: win-x64
            name: MediaDownloader-Windows-x64
            ext: exe
          - os: windows-latest
            arch: arm64
            runtime: win-arm64
            name: MediaDownloader-Windows-arm64
            ext: exe
          - os: ubuntu-latest
            arch: x64
            runtime: linux-x64
            name: MediaDownloader-Linux-x64
            ext: deb
          - os: ubuntu-latest
            arch: arm64
            runtime: linux-arm64
            name: MediaDownloader-Linux-arm64
            ext: deb
          - os: macos-latest
            arch: x64
            runtime: osx-x64
            name: MediaDownloader-macOS-x64
            ext: pkg
          - os: macos-latest
            arch: arm64
            runtime: osx-arm64
            name: MediaDownloader-macOS-arm64
            ext: pkg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ==========================================================
      # PUBLISH .NET app (self-contained for the exact RID)
      # ==========================================================
      - name: Publish App
        run: |
          dotnet publish "Downloader_Backend_(Both_Stacks_Here)/Downloader_Backend.csproj" \
            -c Release \
            -r ${{ matrix.runtime }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -o publish
        shell: bash

      # ==========================================================
      # DOWNLOAD + PREPARE ALL TOOLS (yt-dlp + ffmpeg + deno)
      # Fully matrix-aware → adding any new arch/OS only requires
      # one new matrix row + one small if-branch (no rewrite)
      # ==========================================================
      - name: Download & Prepare Tools (yt-dlp + ffmpeg + deno)
        run: |
          mkdir -p publish/tools
          echo "🛠️ Building for ${{ matrix.os }} / ${{ matrix.arch }} (runtime: ${{ matrix.runtime }})"

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            # --------------------- WINDOWS ---------------------
            # yt-dlp
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe \
                -o publish/tools/yt_dlp_win_x64.exe
            else
              curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_arm64.exe \
                -o publish/tools/yt_dlp_win_arm64.exe
            fi

            # ffmpeg
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              curl -L https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -o ffmpeg_win_x64.zip
              unzip -q ffmpeg_win_x64.zip
              cp ffmpeg-*/bin/ffmpeg.exe publish/tools/ffmpeg_win_x64.exe
            else
              # 7-Zip only needed for arm64
              choco install 7zip -y --no-progress || true
              curl -L https://github.com/tordona/ffmpeg-win-arm64/releases/download/latest/ffmpeg-master-latest-full-static-win-arm64.7z \
                -o ffmpeg_win_arm64.7z
              7z x ffmpeg_win_arm64.7z -oextracted -y >/dev/null 2>&1
              # Robust extraction (works even if folder structure changes)
              cp extracted/ffmpeg.exe publish/tools/ffmpeg_win_arm64.exe \
                || cp extracted/bin/ffmpeg.exe publish/tools/ffmpeg_win_arm64.exe \
                || find extracted -name 'ffmpeg*.exe' -exec cp {} publish/tools/ffmpeg_win_arm64.exe \; || true
            fi

            # deno
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              curl -L https://github.com/denoland/deno/releases/download/v2.7.7/deno-x86_64-pc-windows-msvc.zip -o deno_win_x64.zip
              unzip -q deno_win_x64.zip
              cp deno.exe publish/tools/deno_win_x64.exe
            else
              curl -L https://github.com/denoland/deno/releases/download/v2.7.7/deno-aarch64-pc-windows-msvc.zip -o deno_win_arm64.zip
              unzip -q deno_win_arm64.zip
              cp deno.exe publish/tools/deno_win_arm64.exe
            fi

          elif [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            # --------------------- LINUX ---------------------
            # yt-dlp
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              wget -q https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux -O publish/tools/yt_dlp_linux_x64
              chmod +x publish/tools/yt_dlp_linux_x64
            else
              wget -q https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux_aarch64 -O publish/tools/yt_dlp_linux_arm64
              chmod +x publish/tools/yt_dlp_linux_arm64
            fi

            # ffmpeg
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz -o ffmpeg_linux_x64.tar.xz
              tar -xf ffmpeg_linux_x64.tar.xz
              cp ffmpeg-*-amd64-static/ffmpeg publish/tools/ffmpeg_linux_x64
              chmod +x publish/tools/ffmpeg_linux_x64
            else
              curl -L https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linuxarm64-gpl.tar.xz -o ffmpeg_linux_arm64.tar.xz
              tar -xf ffmpeg_linux_arm64.tar.xz
              # Super robust — works no matter how the tar changes in the future
              FFMPEG_BIN=$(find . -name ffmpeg -type f ! -path '*/doc/*' | head -n1)
              cp "$FFMPEG_BIN" publish/tools/ffmpeg_linux_arm64
              chmod +x publish/tools/ffmpeg_linux_arm64
            fi

            # deno
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              curl -L https://github.com/denoland/deno/releases/download/v2.7.7/deno-x86_64-unknown-linux-gnu.zip -o deno_linux_x64.zip
              unzip -q deno_linux_x64.zip
              cp deno publish/tools/deno_linux_x64
              chmod +x publish/tools/deno_linux_x64
            else
              curl -L https://github.com/denoland/deno/releases/download/v2.7.7/deno-aarch64-unknown-linux-gnu.zip -o deno_linux_arm64.zip
              unzip -q deno_linux_arm64.zip
              cp deno publish/tools/deno_linux_arm64
              chmod +x publish/tools/deno_linux_arm64
            fi

          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            # --------------------- macOS (universal yt-dlp + ffmpeg) ---------------------
            # yt-dlp (universal, works for both arch jobs)
            curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o publish/tools/yt_dlp_mac_universal
            chmod +x publish/tools/yt_dlp_mac_universal

            # ffmpeg (universal)
            TMPDIR=$(mktemp -d)
            curl -L https://github.com/AR1Ablock/ffmpeg-macos-universal2/releases/download/latest/ffmpeg-universal-macos.zip -o "$TMPDIR/ffmpeg_mac_universal.zip"
            unzip -q "$TMPDIR/ffmpeg_mac_universal.zip" -d "$TMPDIR"
            mv "$TMPDIR/ffmpeg" publish/tools/ffmpeg_mac_universal
            chmod +x publish/tools/ffmpeg_mac_universal

            # deno (per-arch — exactly what the old mac step did)
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              DENO_URL="https://github.com/denoland/deno/releases/download/v2.7.7/deno-x86_64-apple-darwin.zip"
              DENO_FILE="deno_mac_x64"
            else
              DENO_URL="https://github.com/denoland/deno/releases/download/v2.7.7/deno-aarch64-apple-darwin.zip"
              DENO_FILE="deno_mac_arm64"
            fi
            curl -fL "$DENO_URL" -o deno_mac.zip
            unzip -q deno_mac.zip
            cp deno "publish/tools/${DENO_FILE}"
            chmod +x "publish/tools/${DENO_FILE}"
          fi

          # Common finalisation (works for every platform/arch)
          chmod +x publish/tools/* 2>/dev/null || true
          if [[ "${{ matrix.os }}" != "windows-latest" ]]; then
            strip publish/tools/* 2>/dev/null || true
          fi
          # ==========================================================
          # -----------------🔥 NEW STRIPPING BLOCK ------------------
          # ==========================================================
          chmod +x publish/Downloader_Backend publish/tools/* 2>/dev/null || true

          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            echo "🔨 Stripping Linux ELF binaries (GNU strip — safe & aggressive)"
            strip --strip-unneeded publish/tools/* 2>/dev/null || true

          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            echo "🔨 Stripping macOS Mach-O binaries (Apple strip — safe flags)"
            strip -x -S publish/tools/* 2>/dev/null || true

          fi
          # ==========================================================
          echo "✅ yt-dlp + ffmpeg + deno ready for ${{ matrix.os }}-${{ matrix.arch }}"
        shell: bash

      # ==========================================================
      # WINDOWS INSTALLER
      # ==========================================================
      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        run: choco install innosetup -y
        shell: cmd

      - name: Build Windows Installer
        if: matrix.os == 'windows-latest'
        run: |
          copy Installers_Resources\MediaDownloader.xml publish\
          copy Installers_Resources\favicon.ico publish\
          copy Installers_Resources\installer.iss installer.iss
          iscc installer.iss
          move Output\MediaDownloaderInstaller.exe ${{ matrix.name }}.exe
        shell: cmd

      # ==========================================================
      # LINUX .deb (now fully supports arm64)
      # ==========================================================
      - name: Build Linux .deb
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y ruby ruby-dev
          sudo gem install fpm

          chmod +x publish/Downloader_Backend
          chmod +x publish/tools/* || true

          mkdir -p package/opt/mediadownloader
          cp -r publish/* package/opt/mediadownloader/

          mkdir -p package/lib/systemd/user
          cp Installers_Resources/mediadownloader.service package/lib/systemd/user/
          mkdir -p package/usr/share/applications
          cp Installers_Resources/mediadownloader.desktop package/usr/share/applications/
          mkdir -p package/usr/share/icons/hicolor/512x512/apps/
          cp publish/wwwroot/favicon.png package/usr/share/icons/hicolor/512x512/apps/mediadownloader.png

          ARCH_DEB=amd64
          [[ "${{ matrix.arch }}" == "arm64" ]] && ARCH_DEB=arm64

          fpm -s dir -t deb -n mediadownloader -v 1.0 \
              --architecture $ARCH_DEB \
              --description "Universal Media Downloader" \
              --after-install Installers_Resources/postinst \
              -C package \
              .

          mv mediadownloader_1.0_*.deb ${{ matrix.name }}.deb
        shell: bash

      # ==========================================================
      # macOS .pkg (deno already placed in tools step — no duplication)
      # ==========================================================
      - name: Build macOS App + PKG
        if: matrix.os == 'macos-latest'
        run: |
          echo "📦 Building macOS .pkg for ${{ matrix.arch }} (all tools already in publish/tools)"

          mkdir -p MediaDownloader.app/Contents/MacOS
          mkdir -p MediaDownloader.app/Contents/Resources
          cp -r publish/* MediaDownloader.app/Contents/MacOS/
          cp Installers_Resources/info.plist MediaDownloader.app/Contents/
          cp Installers_Resources/favicon.icns MediaDownloader.app/Contents/Resources/

          chmod +x MediaDownloader.app/Contents/MacOS/Downloader_Backend
          chmod +x MediaDownloader.app/Contents/MacOS/tools/* || true

          mkdir -p Payload/Applications
          cp -r MediaDownloader.app Payload/Applications/
          mkdir -p Scripts
          cp Installers_Resources/postinstall Scripts/
          cp Installers_Resources/com.mediadownloader.backend.plist Scripts/
          chmod +x Scripts/postinstall

          pkgbuild \
            --root Payload/Applications \
            --identifier com.mediadownloader.pkg \
            --version 1.0 \
            --scripts Scripts \
            ${{ matrix.name }}.pkg
        shell: bash

      # ==========================================================
      # Upload Artifact
      # ==========================================================
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
