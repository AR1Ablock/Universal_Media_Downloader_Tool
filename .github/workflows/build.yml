name: Build MediaDownloader
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Choose environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production
permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
            runtime: win-x64
            name: MediaDownloader-Windows-x64
            ext: exe
          - os: windows-latest
            arch: arm64
            runtime: win-arm64
            name: MediaDownloader-Windows-arm64
            ext: exe
          - os: ubuntu-latest
            arch: x64
            runtime: linux-x64
            name: MediaDownloader-Linux-x64
            ext: deb
          - os: ubuntu-latest
            arch: arm64
            runtime: linux-arm64
            name: MediaDownloader-Linux-arm64
            ext: deb
          - os: macos-latest
            arch: x64
            runtime: osx-x64
            name: MediaDownloader-macOS-x64
            ext: pkg
          - os: macos-latest
            arch: arm64
            runtime: osx-arm64
            name: MediaDownloader-macOS-arm64
            ext: pkg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish App
        run: |
          dotnet publish "Downloader_Backend_(Both_Stacks_Here)/Downloader_Backend.csproj" \
            -c Release \
            -r ${{ matrix.runtime }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -o publish
        shell: bash

      # ==========================================================
      # NEW NESTED TOOLS STRUCTURE + NODE.JS (exactly as requested)
      # ==========================================================
      - name: Download & Prepare Tools → NEW nested structure (yt-dlp + ffmpeg + deno + Node.js)
        run: |
          mkdir -p publish/tools
          echo "🛠️ Building for ${{ matrix.os }} / ${{ matrix.arch }}"

          # Node.js LATEST (no jq needed, works everywhere)
          LATEST=$(curl -s https://nodejs.org/dist/index.json | sed -n 's/.*"version": "\(v[^"]*\)".*/\1/p' | head -n1 | sed 's/^v//')
          echo "📦 Node.js v${LATEST}"

          # Create exact folder structure you asked for
          mkdir -p publish/tools/linux/{x64,arm64}
          mkdir -p publish/tools/windows/{x64,arm64}
          mkdir -p publish/tools/mac/{x64,arm64}

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            # yt-dlp
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -o publish/tools/windows/x64/yt_dlp_win_x64.exe
            else
              curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_arm64.exe -o publish/tools/windows/arm64/yt_dlp_win_arm64.exe
            fi

            # ffmpeg
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              curl -L https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -o ffmpeg_win_x64.zip
              unzip -q ffmpeg_win_x64.zip
              cp ffmpeg-*/bin/ffmpeg.exe publish/tools/windows/x64/ffmpeg_win_x64.exe
            else
              choco install 7zip -y --no-progress || true
              curl -L https://github.com/tordona/ffmpeg-win-arm64/releases/download/latest/ffmpeg-master-latest-full-static-win-arm64.7z -o ffmpeg_win_arm64.7z
              7z x ffmpeg_win_arm64.7z -oextracted -y >/dev/null 2>&1
              cp extracted/ffmpeg.exe publish/tools/windows/arm64/ffmpeg_win_arm64.exe \
                || cp extracted/bin/ffmpeg.exe publish/tools/windows/arm64/ffmpeg_win_arm64.exe \
                || find extracted -name 'ffmpeg*.exe' -exec cp {} publish/tools/windows/arm64/ffmpeg_win_arm64.exe \; || true
            fi

            # deno
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              curl -L https://github.com/denoland/deno/releases/download/v2.7.7/deno-x86_64-pc-windows-msvc.zip -o deno_win_x64.zip
              unzip -q deno_win_x64.zip
              cp deno.exe publish/tools/windows/x64/deno_win_x64.exe
            else
              curl -L https://github.com/denoland/deno/releases/download/v2.7.7/deno-aarch64-pc-windows-msvc.zip -o deno_win_arm64.zip
              unzip -q deno_win_arm64.zip
              cp deno.exe publish/tools/windows/arm64/deno_win_arm64.exe
            fi

            # Node.js
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              curl -L https://nodejs.org/dist/v${LATEST}/node-v${LATEST}-win-x64.zip -o node.zip
              unzip -q node.zip
              cp node-v${LATEST}-win-x64/node.exe publish/tools/windows/x64/node_win_x64.exe
            else
              curl -L https://nodejs.org/dist/v${LATEST}/node-v${LATEST}-win-arm64.zip -o node.zip
              unzip -q node.zip
              cp node-v${LATEST}-win-arm64/node.exe publish/tools/windows/arm64/node_win_arm64.exe
            fi

          elif [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            # yt-dlp
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              wget -q https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux -O publish/tools/linux/x64/yt_dlp_linux_x64
              chmod +x publish/tools/linux/x64/yt_dlp_linux_x64
            else
              wget -q https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux_aarch64 -O publish/tools/linux/arm64/yt_dlp_linux_arm64
              chmod +x publish/tools/linux/arm64/yt_dlp_linux_arm64
            fi

            # ffmpeg
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz -o ffmpeg.tar.xz
              tar -xf ffmpeg.tar.xz
              cp ffmpeg-*-amd64-static/ffmpeg publish/tools/linux/x64/ffmpeg_linux_x64
              chmod +x publish/tools/linux/x64/ffmpeg_linux_x64
            else
              curl -L https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linuxarm64-gpl.tar.xz -o ffmpeg.tar.xz
              tar -xf ffmpeg.tar.xz
              FFMPEG_BIN=$(find . -name ffmpeg -type f ! -path '*/doc/*' | head -n1)
              cp "$FFMPEG_BIN" publish/tools/linux/arm64/ffmpeg_linux_arm64
              chmod +x publish/tools/linux/arm64/ffmpeg_linux_arm64
            fi

            # deno
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              curl -L https://github.com/denoland/deno/releases/download/v2.7.7/deno-x86_64-unknown-linux-gnu.zip -o deno.zip
              unzip -q deno.zip
              cp deno publish/tools/linux/x64/deno_linux_x64
              chmod +x publish/tools/linux/x64/deno_linux_x64
            else
              curl -L https://github.com/denoland/deno/releases/download/v2.7.7/deno-aarch64-unknown-linux-gnu.zip -o deno.zip
              unzip -q deno.zip
              cp deno publish/tools/linux/arm64/deno_linux_arm64
              chmod +x publish/tools/linux/arm64/deno_linux_arm64
            fi

            # Node.js
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              curl -L https://nodejs.org/dist/v${LATEST}/node-v${LATEST}-linux-x64.tar.gz -o node.tar.gz
              tar -xf node.tar.gz
              cp node-v${LATEST}-linux-x64/bin/node publish/tools/linux/x64/node_linux_x64
              chmod +x publish/tools/linux/x64/node_linux_x64
            else
              curl -L https://nodejs.org/dist/v${LATEST}/node-v${LATEST}-linux-arm64.tar.gz -o node.tar.gz
              tar -xf node.tar.gz
              cp node-v${LATEST}-linux-arm64/bin/node publish/tools/linux/arm64/node_linux_arm64
              chmod +x publish/tools/linux/arm64/node_linux_arm64
            fi

          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            # yt-dlp + ffmpeg universal (at mac/ root)
            curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o publish/tools/mac/yt_dlp_mac_universal
            chmod +x publish/tools/mac/yt_dlp_mac_universal

            TMPDIR=$(mktemp -d)
            curl -L https://github.com/AR1Ablock/ffmpeg-macos-universal2/releases/download/latest/ffmpeg-universal-macos.zip -o "$TMPDIR/ffmpeg.zip"
            unzip -q "$TMPDIR/ffmpeg.zip" -d "$TMPDIR"
            mv "$TMPDIR/ffmpeg" publish/tools/mac/ffmpeg_mac_universal
            chmod +x publish/tools/mac/ffmpeg_mac_universal

            # deno + Node.js (per-arch under mac/x64 and mac/arm64)
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              DENO_URL="https://github.com/denoland/deno/releases/download/v2.7.7/deno-x86_64-apple-darwin.zip"
              DEST="publish/tools/mac/x64"
              DENO_NAME="deno_mac_x64"
              NODE_NAME="node_mac_x64"
              NODE_TAR="node-v${LATEST}-darwin-x64"
            else
              DENO_URL="https://github.com/denoland/deno/releases/download/v2.7.7/deno-aarch64-apple-darwin.zip"
              DEST="publish/tools/mac/arm64"
              DENO_NAME="deno_mac_arm64"
              NODE_NAME="node_mac_arm64"
              NODE_TAR="node-v${LATEST}-darwin-arm64"
            fi

            # deno
            curl -fL "$DENO_URL" -o deno.zip
            unzip -q deno.zip
            cp deno "${DEST}/${DENO_NAME}"
            chmod +x "${DEST}/${DENO_NAME}"

            # Node.js
            curl -L "https://nodejs.org/dist/v${LATEST}/${NODE_TAR}.tar.gz" -o node.tar.gz
            tar -xf node.tar.gz
            cp "${NODE_TAR}/bin/node" "${DEST}/${NODE_NAME}"
            chmod +x "${DEST}/${NODE_NAME}"
          fi

          # Final permissions + strip (recursive on new structure)
          find publish/tools -type f -exec chmod +x {} \; 2>/dev/null || true
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            find publish/tools -type f -exec strip --strip-unneeded {} \; 2>/dev/null || true
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            find publish/tools -type f -exec strip -x -S {} \; 2>/dev/null || true
          fi

          chmod +x publish/Downloader_Backend 2>/dev/null || true
          echo "✅ All tools ready in NEW nested structure!"
        shell: bash

      # ==================== Windows ====================
      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        run: choco install innosetup -y
        shell: cmd

      - name: Build Windows Installer
        if: matrix.os == 'windows-latest'
        run: |
          copy Installers_Resources\MediaDownloader.xml publish\
          copy Installers_Resources\favicon.ico publish\
          copy Installers_Resources\installer.iss installer.iss
          iscc installer.iss
          move Output\MediaDownloaderInstaller.exe ${{ matrix.name }}.exe
        shell: cmd
      # ==================== Linux (.deb) ====================
      - name: Build Linux .deb
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y ruby ruby-dev
          sudo gem install fpm
          chmod +x publish/Downloader_Backend
          mkdir -p package/opt/mediadownloader
          cp -r publish/* package/opt/mediadownloader/
          mkdir -p package/lib/systemd/user
          cp Installers_Resources/mediadownloader.service package/lib/systemd/user/
          mkdir -p package/usr/share/applications
          cp Installers_Resources/mediadownloader.desktop package/usr/share/applications/
          mkdir -p package/usr/share/icons/hicolor/512x512/apps/
          cp publish/wwwroot/favicon.png package/usr/share/icons/hicolor/512x512/apps/mediadownloader.png
          ARCH_DEB=amd64
          [[ "${{ matrix.arch }}" == "arm64" ]] && ARCH_DEB=arm64
          fpm -s dir -t deb -n mediadownloader -v 1.0 \
              --architecture $ARCH_DEB \
              --description "Universal Media Downloader" \
              --after-install Installers_Resources/postinst \
              -C package \
              .
          mv mediadownloader_1.0_*.deb ${{ matrix.name }}.deb
        shell: bash
      # ==================== MacOS (.pkg) ====================
      - name: Build macOS App + PKG
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p MediaDownloader.app/Contents/macOS
          mkdir -p MediaDownloader.app/Contents/Resources
          cp -r publish/* MediaDownloader.app/Contents/macOS/
          cp Installers_Resources/info.plist MediaDownloader.app/Contents/
          cp Installers_Resources/favicon.icns MediaDownloader.app/Contents/Resources/
          chmod +x MediaDownloader.app/Contents/macOS/Downloader_Backend
          chmod +x MediaDownloader.app/Contents/macOS/tools/* 2>/dev/null || true
          mkdir -p Payload/Applications
          cp -r MediaDownloader.app Payload/Applications/
          mkdir -p Scripts
          cp Installers_Resources/postinstall Scripts/
          cp Installers_Resources/com.mediadownloader.backend.plist Scripts/
          chmod +x Scripts/postinstall
          pkgbuild \
            --root Payload/Applications \
            --identifier com.mediadownloader.pkg \
            --version 1.0 \
            --scripts Scripts \
            ${{ matrix.name }}.pkg
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
